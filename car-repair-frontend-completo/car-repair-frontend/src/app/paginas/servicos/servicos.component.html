<section class="pagina">
  <h1>Catálogo de Serviços</h1>

  <form #formServico="ngForm" class="formulario" (ngSubmit)="salvar(formServico)">
    <label>Nome <input name="nome" [(ngModel)]="novoServico.nome" required /></label>
    <label>Descrição <textarea name="descricao" [(ngModel)]="novoServico.descricao" rows="2"></textarea></label>
    <label>Preço base (R$) <input name="precoBase" type="number" step="0.01" [(ngModel)]="novoServico.precoBase" required /></label>
    <label>Tempo estimado (min) <input name="tempoEstimadoMinutos" type="number" [(ngModel)]="novoServico.tempoEstimadoMinutos" /></label>

    <ul class="erros" *ngIf="errosFormulario.length">
      <li *ngFor="let e of errosFormulario">{{ e }}</li>
    </ul>
    <button type="submit">Adicionar serviço</button>
  </form>

  <table>
    <thead>
      <tr><th>Nome</th><th>Descrição</th><th>Preço base</th><th>Tempo (min)</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of servicos">
        <td>{{ s.nome }}</td>
        <td>{{ s.descricao }}</td>
        <td>{{ s.precoBase | number:'1.2-2' }}</td>
        <td>{{ s.tempoEstimadoMinutos ?? '—' }}</td>
      </tr>
    </tbody>
  </table>
</section>
