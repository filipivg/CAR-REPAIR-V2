<section class="pagina">
  <h1>Clientes</h1>

  <form #formCliente="ngForm" class="formulario" (ngSubmit)="salvar(formCliente)">
    <label>Nome <input name="nome" [(ngModel)]="novoCliente.nome" required /></label>
    <label>CPF <input name="cpf" [(ngModel)]="novoCliente.cpf" required placeholder="Somente números" /></label>
    <label>Telefone <input name="telefone" [(ngModel)]="novoCliente.telefone" required /></label>
    <label>E-mail <input name="email" [(ngModel)]="novoCliente.email" type="email" /></label>

    <ul class="erros" *ngIf="errosFormulario.length">
      <li *ngFor="let erro of errosFormulario">{{ erro }}</li>
    </ul>
    <button type="submit">Adicionar cliente</button>
  </form>

  <table>
    <thead>
      <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>E-mail</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of clientes">
        <td>{{ c.nome }}</td>
        <td>{{ c.cpf }}</td>
        <td>{{ c.telefone }}</td>
        <td>{{ c.email }}</td>
      </tr>
    </tbody>
  </table>
</section>
