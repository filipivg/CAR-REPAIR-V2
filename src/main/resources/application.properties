spring.application.name=car-repair
server.port=9081

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Banco de dados
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/car_repair
spring.datasource.username=postgres
spring.datasource.password=senha123

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Serialização JSON: ignora campos nulos na resposta
spring.jackson.default-property-inclusion=non_null

# CRUCIAL: define como o JPA cria/atualiza as tabelas 
# 'update'  → cria se não existir, atualiza se mudar (recomendado para desenvolvimento) 
# 'create'  → apaga tudo e recria do zero a cada execução (cuidado: perde os dados) 
# 'validate'→ só valida se as tabelas batem com as entidades, não muda nada 
# 'none'    → não faz nada automaticamente (recomendado para produção) 
spring.jpa.hibernate.ddl-auto=update 

# Timezone 
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo